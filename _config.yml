# Site settings
site: cameronwalker.nz
title: Cameron Walker
keywords: ephesus, blog
description: >-
  IT Professional, Digital Nomad, Geek.
lang: en-US
timezone:  Auckland/Pacific
repo:  # site repo [optional]
google_verify:      XXX # Put your Google Verification here
google_analytics:   UA-XXXXXXXX-00 # Put your Google Analytics code
discus-identifier:  XXX

# Author settings
author:
  name: Cameron Walker
  bio: Computer Technician
  picture: assets/images/profile.jpg 
  github: t94xr # github username
  twitter: t94xr # twitter username
  facebook: t94xr # facebook username
  instagram: t94xr # instagram username
  youtube: https://www.youtube.com/channel/UC9vv06aLy64tJtzV7OoJJrQ # youtube username
  linkedin:  # linkedin username
  email: me@cameronwalker.nz # email adress


# URL settings
url: "http://cameronwalker.nz" # Domain Name of host. [username].github.io for github pages
permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge


exclude:
  - .jekyll-cache
  - .obsidian
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - CONTRIBUTING.md

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-relative-links
paginate: 20
paginate_path: "/page/:num"

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:slug
  
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

relative_links:
  enabled:     true
  collections: false